name: Deploy to SmarterASP

on:
  push:
    branches: [ master, main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Build and Publish
      run: dotnet publish SplashCityCarwash.csproj -c Release -o ./publish

    - name: Create app_offline.htm
      run: echo "Deploying updates, please wait..." > ./publish/app_offline.htm

    - name: Deploy via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        protocol: ftp
        local-dir: ./publish/
        server-dir: /site1/wwwroot/
        exclude: |
          **/appsettings.json
          **/appsettings.Development.json
          **/.git*
          **/.git*/**

    - name: Remove app_offline.htm
      run: |
        curl --ftp-method nocwd --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
             -Q "DELE /site1/wwwroot/app_offline.htm" \
             "ftp://${{ secrets.FTP_SERVER }}/" || true